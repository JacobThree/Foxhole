- name: Install runtime packages
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - docker.io
      - git
      - nmap
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Create Foxhole group
  ansible.builtin.group:
    name: "{{ foxhole_group }}"
    system: true
    state: present

- name: Create Foxhole service user
  ansible.builtin.user:
    name: "{{ foxhole_user }}"
    group: "{{ foxhole_group }}"
    home: "{{ foxhole_install_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: true
    state: present

- name: Create install directory
  ansible.builtin.file:
    path: "{{ foxhole_install_dir }}"
    state: directory
    owner: "{{ foxhole_user }}"
    group: "{{ foxhole_group }}"
    mode: "0750"

- name: Create data directory
  ansible.builtin.file:
    path: "{{ foxhole_install_dir }}/data"
    state: directory
    owner: "{{ foxhole_user }}"
    group: "{{ foxhole_group }}"
    mode: "0750"

- name: Create static dashboard directory
  ansible.builtin.file:
    path: "{{ foxhole_install_dir }}/ui/out"
    state: directory
    owner: "{{ foxhole_user }}"
    group: "{{ foxhole_group }}"
    mode: "0755"

- name: Check local static dashboard build
  ansible.builtin.stat:
    path: "{{ foxhole_package_path }}/ui/out/index.html"
  delegate_to: localhost
  become: false
  register: foxhole_static_ui_local

- name: Require static dashboard build
  ansible.builtin.fail:
    msg: "Static dashboard is missing. Run `cd ui && pnpm install && pnpm build` before the Ansible install."
  when: not foxhole_static_ui_local.stat.exists

- name: Install static dashboard
  ansible.builtin.copy:
    src: "{{ foxhole_package_path }}/ui/out/"
    dest: "{{ foxhole_install_dir }}/ui/out/"
    owner: "{{ foxhole_user }}"
    group: "{{ foxhole_group }}"
    mode: preserve

- name: Create config directory
  ansible.builtin.file:
    path: "{{ foxhole_config_dir }}"
    state: directory
    owner: root
    group: "{{ foxhole_group }}"
    mode: "0770"

- name: Create env file if missing
  ansible.builtin.copy:
    dest: "{{ foxhole_config_dir }}/foxhole.env"
    content: ""
    owner: root
    group: "{{ foxhole_group }}"
    mode: "0660"
    force: false

- name: Install Foxhole package in virtualenv
  ansible.builtin.pip:
    name: "{{ foxhole_package_path }}"
    virtualenv: "{{ foxhole_install_dir }}/venv"
    virtualenv_command: python3 -m venv
  become_user: "{{ foxhole_user }}"

- name: Install systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/homelab-agent.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Foxhole homelab diagnostic agent
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ foxhole_user }}
      Group={{ foxhole_group }}
      WorkingDirectory={{ foxhole_install_dir }}
      EnvironmentFile={{ foxhole_config_dir }}/foxhole.env
      Environment=FOXHOLE_RUNTIME_MODE=single
      Environment=FOXHOLE_SCHEDULER_ENABLED=true
      Environment=FOXHOLE_DATABASE_PATH={{ foxhole_install_dir }}/data/foxhole.db
      Environment=FOXHOLE_CONFIG_ENV_PATH={{ foxhole_config_dir }}/foxhole.env
      Environment=FOXHOLE_STATIC_UI_DIR={{ foxhole_install_dir }}/ui/out
      ExecStart={{ foxhole_install_dir }}/venv/bin/uvicorn agent.main:app --host 0.0.0.0 --port 8000
      Restart=on-failure
      RestartSec=5
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths={{ foxhole_install_dir }} {{ foxhole_config_dir }}
      CapabilityBoundingSet=
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      LockPersonality=true
      MemoryDenyWriteExecute=true

      [Install]
      WantedBy=multi-user.target
  notify: Restart homelab-agent

- name: Enable Foxhole service
  ansible.builtin.systemd:
    name: homelab-agent.service
    enabled: true
    daemon_reload: true
